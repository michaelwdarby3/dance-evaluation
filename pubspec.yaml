name: dance_evaluation
description: AI-powered dance movement evaluation app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter

  # Camera & ML
  camera: ^0.11.0+2
  google_mlkit_pose_detection: ^0.12.0

  # State management
  provider: ^6.1.2

  # Routing
  go_router: ^14.8.1

  # Data modeling
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.7

  # Local storage (M2 — isar v4 dev not yet on pub.dev)
  # isar: ^4.0.0-dev.14
  # isar_flutter_libs: ^4.0.0-dev.14
  flutter_secure_storage: ^9.2.4

  # Networking
  dio: ^5.7.0
  connectivity_plus: ^6.1.1

  # Charts
  fl_chart: ^0.70.2

  # Utilities
  path_provider: ^2.1.5
  web: ^1.1.0
  just_audio: ^0.10.5
  image_picker: ^1.2.1
  video_thumbnail: ^0.5.6
  video_player: ^2.11.1
  http: ^1.6.0
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  build_runner: ^2.4.14
  freezed: ^2.5.8
  json_serializable: ^6.9.1
  # isar_generator: ^4.0.0-dev.14
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4
  fake_async: ^1.3.2

flutter:
  uses-material-design: true

  assets:
    - assets/references/
